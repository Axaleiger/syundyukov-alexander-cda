# Деплой на сервер по SSH. Секреты: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY, DEPLOY_PATH
# Инструкция по секретам — вне репозитория: см. GITHUB_ACTIONS_DEPLOY.md в каталоге Sin/

name: Deploy

on:
  push:
    branches:
      - dev
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail
            REF="${{ github.ref_name }}"
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin
            git checkout "$REF"
            git pull --ff-only origin "$REF"
            docker compose -f docker-compose.yml -f docker-compose.server.yml --env-file .env up -d --build
