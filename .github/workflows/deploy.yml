# Деплой на сервер по SSH. Секреты: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY, DEPLOY_PATH
# Секреты: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY, DEPLOY_PATH. Документация CI — вне репозитория (файлы GITHUB_*.md у оператора).

name: Deploy

on:
  push:
    branches:
      - server

# Одна активная сборка/деплой на сервер (все ветки в одной очереди — без параллельных docker build на хосте).
concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          VITE_GROQ_API_KEY: ${{ secrets.VITE_GROQ_API_KEY }}
          VITE_EXPO: ${{ secrets.VITE_EXPO }}
          VITE_EXPO_DISABLE_TABS: ${{ secrets.VITE_EXPO_DISABLE_TABS }}
          VITE_EXPO_ARM_DELAY_MS: ${{ secrets.VITE_EXPO_ARM_DELAY_MS }}
          VITE_EXPO_IDLE_MS: ${{ secrets.VITE_EXPO_IDLE_MS }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          envs: VITE_GROQ_API_KEY,VITE_EXPO,VITE_EXPO_DISABLE_TABS,VITE_EXPO_ARM_DELAY_MS,VITE_EXPO_IDLE_MS
          script: |
            set -euo pipefail
            REF="${{ github.ref_name }}"
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin
            git checkout "$REF"
            git pull --ff-only origin "$REF"
            export VITE_GROQ_API_KEY="${VITE_GROQ_API_KEY:-}"
            export VITE_EXPO="${VITE_EXPO:-}"
            export VITE_EXPO_DISABLE_TABS="${VITE_EXPO_DISABLE_TABS:-}"
            export VITE_EXPO_ARM_DELAY_MS="${VITE_EXPO_ARM_DELAY_MS:-}"
            export VITE_EXPO_IDLE_MS="${VITE_EXPO_IDLE_MS:-}"
            docker compose -f docker-compose.server.yml --env-file .env up -d --build
