# Деплой стенда /new-demo: пересобирает только nginx_newdemo.

name: Deploy NewDemo

on:
  push:
    branches:
      - server
    paths:
      - "frontend/src/**/new-demo/**"
      - "frontend/src/pages/new-demo/**"
      - "frontend/src/app/layouts/new-demo/**"
      - "frontend/src/app/layouts/NewDemoLayout.jsx"
      - "frontend/src/modules/thinking/**"
      - "frontend/src/core/data/static/**"
      - "frontend/src/app/stands/standsConfig.js"
      - "Dockerfile.nginx.newdemo"
      - "docker-compose.server.yml"
      - "docker/nginx/server.conf"
      - ".github/workflows/deploy-newdemo.yml"
  workflow_dispatch:

concurrency:
  group: deploy-server-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy new-demo over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          VITE_GROQ_API_KEY: ${{ secrets.VITE_GROQ_API_KEY }}
          VITE_EXPO: ${{ secrets.VITE_EXPO }}
          VITE_EXPO_DISABLE_TABS: ${{ secrets.VITE_EXPO_DISABLE_TABS }}
          VITE_EXPO_ARM_DELAY_MS: ${{ secrets.VITE_EXPO_ARM_DELAY_MS }}
          VITE_EXPO_IDLE_MS: ${{ secrets.VITE_EXPO_IDLE_MS }}
          NEW_DEMO_VITE_GROQ_API_KEY: ${{ secrets.NEW_DEMO_VITE_GROQ_API_KEY }}
          NEW_DEMO_VITE_EXPO: ${{ secrets.NEW_DEMO_VITE_EXPO }}
          NEW_DEMO_VITE_EXPO_DISABLE_TABS: ${{ secrets.NEW_DEMO_VITE_EXPO_DISABLE_TABS }}
          NEW_DEMO_VITE_EXPO_ARM_DELAY_MS: ${{ secrets.NEW_DEMO_VITE_EXPO_ARM_DELAY_MS }}
          NEW_DEMO_VITE_EXPO_IDLE_MS: ${{ secrets.NEW_DEMO_VITE_EXPO_IDLE_MS }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 30m
          script_stop: true
          envs: VITE_GROQ_API_KEY,VITE_EXPO,VITE_EXPO_DISABLE_TABS,VITE_EXPO_ARM_DELAY_MS,VITE_EXPO_IDLE_MS,NEW_DEMO_VITE_GROQ_API_KEY,NEW_DEMO_VITE_EXPO,NEW_DEMO_VITE_EXPO_DISABLE_TABS,NEW_DEMO_VITE_EXPO_ARM_DELAY_MS,NEW_DEMO_VITE_EXPO_IDLE_MS
          script: |
            set -euo pipefail
            REF="${{ github.ref_name }}"
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin
            git checkout "$REF"
            git pull --ff-only origin "$REF"
            export NEW_DEMO_VITE_GROQ_API_KEY="${NEW_DEMO_VITE_GROQ_API_KEY:-${VITE_GROQ_API_KEY:-}}"
            export NEW_DEMO_VITE_EXPO="${NEW_DEMO_VITE_EXPO:-${VITE_EXPO:-}}"
            export NEW_DEMO_VITE_EXPO_DISABLE_TABS="${NEW_DEMO_VITE_EXPO_DISABLE_TABS:-${VITE_EXPO_DISABLE_TABS:-}}"
            export NEW_DEMO_VITE_EXPO_ARM_DELAY_MS="${NEW_DEMO_VITE_EXPO_ARM_DELAY_MS:-${VITE_EXPO_ARM_DELAY_MS:-}}"
            export NEW_DEMO_VITE_EXPO_IDLE_MS="${NEW_DEMO_VITE_EXPO_IDLE_MS:-${VITE_EXPO_IDLE_MS:-}}"
            {
              echo "NEW_DEMO_VITE_GROQ_API_KEY=${NEW_DEMO_VITE_GROQ_API_KEY:-}"
              echo "NEW_DEMO_VITE_EXPO=${NEW_DEMO_VITE_EXPO:-}"
              echo "NEW_DEMO_VITE_EXPO_DISABLE_TABS=${NEW_DEMO_VITE_EXPO_DISABLE_TABS:-}"
              echo "NEW_DEMO_VITE_EXPO_ARM_DELAY_MS=${NEW_DEMO_VITE_EXPO_ARM_DELAY_MS:-}"
              echo "NEW_DEMO_VITE_EXPO_IDLE_MS=${NEW_DEMO_VITE_EXPO_IDLE_MS:-}"
            } > .env.deploy.newdemo.vite
            chmod 600 .env.deploy.newdemo.vite
            docker compose -f docker-compose.server.yml --env-file .env --env-file .env.deploy.newdemo.vite build nginx_newdemo
            docker compose -f docker-compose.server.yml --env-file .env --env-file .env.deploy.newdemo.vite up -d --remove-orphans db api nginx_newdemo edge
