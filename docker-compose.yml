# База: PostgreSQL + FastAPI. Фронт подключается отдельно:
#   прод:  + docker-compose.server.yml (nginx + статика)
#   локально с HMR: + docker-compose.local.yml (Vite)

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cda_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-cda}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cda}:${POSTGRES_PASSWORD:-cda_change_me}@db:5432/${POSTGRES_DB:-cda}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
