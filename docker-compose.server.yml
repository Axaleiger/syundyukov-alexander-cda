# Сервер 158.160.149.143: nginx + статика, server.conf.
# Запуск: docker compose -f docker-compose.yml -f docker-compose.server.yml --env-file .env up -d --build

services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
      args:
        VITE_GROQ_API_KEY: ${VITE_GROQ_API_KEY:-}
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      - api
    volumes:
      - ./docker/nginx/server.conf:/etc/nginx/conf.d/default.conf:ro
      # HTTP-01 для Let's Encrypt (IP / shortlived)
      - /var/www/certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
