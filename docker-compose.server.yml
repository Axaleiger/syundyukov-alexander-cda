# Продакшен-сервер: PostgreSQL + FastAPI + nginx (два бандла: / и /new-demo/).
# Запуск: docker compose -f docker-compose.server.yml --env-file .env --env-file .env.deploy.vite up -d --build
# .env.deploy.vite: VITE_* (основной стенд) и NEW_DEMO_VITE_* (new-demo); см. compose.env.example и Deploy workflow.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cda_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-cda}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cda}:${POSTGRES_PASSWORD:-cda_change_me}@db:5432/${POSTGRES_DB:-cda}
    depends_on:
      db:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
      args:
        # Основной стенд (/, /demo)
        VITE_GROQ_API_KEY: ${VITE_GROQ_API_KEY:-}
        VITE_EXPO: ${VITE_EXPO:-}
        VITE_EXPO_DISABLE_TABS: ${VITE_EXPO_DISABLE_TABS:-}
        VITE_EXPO_ARM_DELAY_MS: ${VITE_EXPO_ARM_DELAY_MS:-}
        VITE_EXPO_IDLE_MS: ${VITE_EXPO_IDLE_MS:-}
        # New-demo (/new-demo/) — отдельные секреты; если пусто, в Dockerfile подставятся те же ARG что и у main (см. .env.deploy.vite в CI).
        NEW_DEMO_VITE_GROQ_API_KEY: ${NEW_DEMO_VITE_GROQ_API_KEY:-${VITE_GROQ_API_KEY:-}}
        NEW_DEMO_VITE_EXPO: ${NEW_DEMO_VITE_EXPO:-${VITE_EXPO:-}}
        NEW_DEMO_VITE_EXPO_DISABLE_TABS: ${NEW_DEMO_VITE_EXPO_DISABLE_TABS:-${VITE_EXPO_DISABLE_TABS:-}}
        NEW_DEMO_VITE_EXPO_ARM_DELAY_MS: ${NEW_DEMO_VITE_EXPO_ARM_DELAY_MS:-${VITE_EXPO_ARM_DELAY_MS:-}}
        NEW_DEMO_VITE_EXPO_IDLE_MS: ${NEW_DEMO_VITE_EXPO_IDLE_MS:-${VITE_EXPO_IDLE_MS:-}}
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      - api
    volumes:
      - ./docker/nginx/server.conf:/etc/nginx/conf.d/default.conf:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  pgdata:
