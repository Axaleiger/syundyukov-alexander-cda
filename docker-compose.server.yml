# Продакшен-сервер: PostgreSQL + FastAPI + edge nginx + два независимых фронтовых сервиса.
# Запуск: docker compose -f docker-compose.server.yml --env-file .env --env-file .env.deploy.vite up -d
# Сборки стендов выполняются отдельно:
#   docker compose ... build nginx_main
#   docker compose ... build nginx_newdemo

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cda_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-cda}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cda}:${POSTGRES_PASSWORD:-cda_change_me}@db:5432/${POSTGRES_DB:-cda}
    depends_on:
      db:
        condition: service_healthy

  nginx_main:
    build:
      context: .
      dockerfile: Dockerfile.nginx.main
      args:
        VITE_GROQ_API_KEY: ${VITE_GROQ_API_KEY:-}
        VITE_EXPO: ${VITE_EXPO:-}
        VITE_EXPO_DISABLE_TABS: ${VITE_EXPO_DISABLE_TABS:-}
        VITE_EXPO_ARM_DELAY_MS: ${VITE_EXPO_ARM_DELAY_MS:-}
        VITE_EXPO_IDLE_MS: ${VITE_EXPO_IDLE_MS:-}
    restart: unless-stopped
    depends_on:
      - api

  nginx_newdemo:
    build:
      context: .
      dockerfile: Dockerfile.nginx.newdemo
      args:
        NEW_DEMO_VITE_GROQ_API_KEY: ${NEW_DEMO_VITE_GROQ_API_KEY:-${VITE_GROQ_API_KEY:-}}
        NEW_DEMO_VITE_EXPO: ${NEW_DEMO_VITE_EXPO:-${VITE_EXPO:-}}
        NEW_DEMO_VITE_EXPO_DISABLE_TABS: ${NEW_DEMO_VITE_EXPO_DISABLE_TABS:-${VITE_EXPO_DISABLE_TABS:-}}
        NEW_DEMO_VITE_EXPO_ARM_DELAY_MS: ${NEW_DEMO_VITE_EXPO_ARM_DELAY_MS:-${VITE_EXPO_ARM_DELAY_MS:-}}
        NEW_DEMO_VITE_EXPO_IDLE_MS: ${NEW_DEMO_VITE_EXPO_IDLE_MS:-${VITE_EXPO_IDLE_MS:-}}
    restart: unless-stopped
    depends_on:
      - api

  edge:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      - api
    volumes:
      - ./docker/nginx/server.conf:/etc/nginx/conf.d/default.conf:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  pgdata:
