# Локальная развёртка с HMR: PostgreSQL + FastAPI + Vite (код из frontend/). Один файл.
# Фронт: http://localhost:${DEV_PORT:-3000} — API проксируется с /api на FastAPI.
# Запуск: docker compose -f docker-compose.local.yml --env-file .env up --build
# Остановка: docker compose -f docker-compose.local.yml down --remove-orphans

name: cda-local

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cda_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-cda}
    volumes:
      - pgdata_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cda}:${POSTGRES_PASSWORD:-cda_change_me}@db:5432/${POSTGRES_DB:-cda}
    depends_on:
      db:
        condition: service_healthy

  vite:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "${DEV_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      VITE_DOCKER: "1"
      VITE_GROQ_API_KEY: ${VITE_GROQ_API_KEY:-}
    volumes:
      - ./frontend:/app
      - vite_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  pgdata_local:
  vite_node_modules:
