# HTTPS + редирект HTTP→HTTPS. Подключать после успешного:
#   sudo ./scripts/letsencrypt-ip-setup.sh
# Сертификат Let’s Encrypt (IP, shortlived) в /etc/letsencrypt/live/<IP>/

server {
    listen 80;
    server_name 158.160.149.143;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name 158.160.149.143;

    ssl_certificate     /etc/letsencrypt/live/158.160.149.143/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/158.160.149.143/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
